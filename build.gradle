 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'java-library'
    id 'maven-publish'
    id "org.hidetake.ssh" version "2.11.2"
    id 'war'
}

apply plugin: 'org.hidetake.ssh'
remotes {
    host {
        host = 'homedecord.id.vn'
        user = 'root'
        password = '123'
    }
}
ssh.settings {
    knownHosts = allowAnyHosts
}



repositories {
    mavenCentral()
}

dependencies {
    providedCompile 'jakarta.servlet:jakarta.servlet-api:6.0.0'

    implementation 'org.glassfish.web:jakarta.servlet.jsp.jstl:2.0.0'
    implementation 'jakarta.servlet.jsp.jstl:jakarta.servlet.jsp.jstl-api:2.0.0'

    implementation 'com.mysql:mysql-connector-j:8.0.33'

    implementation 'org.mindrot:jbcrypt:0.4'
    implementation 'com.sun.mail:jakarta.mail:2.0.1'
    implementation 'org.apache.httpcomponents:httpclient:4.5.14'
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'org.json:json:20230227'
}

group = 'com.example'
version = '1.0-SNAPSHOT'
description = 'backend'
java.sourceCompatibility = JavaVersion.VERSION_15

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}
task docker_app_start {
    doLast {
        println 'begin docker_app_start'
        ssh.run {
            session(remotes.host) {
                execute 'docker stop tomcat10', ignoreError: true
                execute 'docker rm tomcat10', ignoreError: true
                execute 'docker run -d ' +
                        '--name tomcat10 ' +
                        '-v /usr/deploy/ROOT.war:/usr/local/tomcat/webapps/ROOT.war ' +
                        '-p 8080:8080 ' +
                        'tomcat:10.1.49'
            }
        }
    }
}
task docker_upload_file_to_server {
    doLast {
        println 'begin docker_upload_file_to_server'
        ssh.run {
            session(remotes.host) {
                remove '/usr/deploy/lab.war'
                remove '/usr/deploy/lab/'
                put from: "${project.projectDir}/build/libs/backend-1.0-SNAPSHOT.war",
                        into: "/usr/deploy/ROOT.war"
            }
        }
    }
}
task docker_deploy {
    docker_deploy.dependsOn docker_app_start
    docker_deploy.dependsOn docker_upload_file_to_server
    docker_deploy.dependsOn build
    tasks.getByName('docker_app_start').mustRunAfter docker_upload_file_to_server
}



